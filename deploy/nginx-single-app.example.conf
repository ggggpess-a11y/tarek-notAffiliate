# مثال: الموقع كاملاً (الواجهة + /blog + /api) على Node بعد `npm run build` و `npm start`.
# لا تضف location منفصلاً لـ /blog يوجّه إلى /api فقط — وإلا يعيد JSON وقد يبدأ المتصفح تنزيلاً عند الرجوع أو فتح الرابط.
#
# غيّر المنفذ إلى PORT الفعلي (مثلاً 4000 أو ما يضبطه Dokploy).

location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
