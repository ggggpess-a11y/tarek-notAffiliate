# ضِف داخل server { ... } عندما يكون الموقع الثابت والـ API على خدمتين منفصلتين.
# إن شغّلت `npm start` بعد `npm run build` فالخادم الواحد يجمع الواجهة + /api — لا حاجة لهذا المقطع.
# غيّر المنفذ إلى PORT/API_PORT الفعلي (غالبًا 4000 محليًا، أو ما يضبطه Dokploy).

location /api {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
